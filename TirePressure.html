<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TirePressure Pro | Road & Gravel</title>
    <style>
        :root { --strava: #fc4c02; --dark: #1a1a1a; --light: #f4f4f9; }
        body { font-family: -apple-system, sans-serif; background: var(--light); color: var(--dark); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        h1 { color: var(--strava); text-align: center; font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; }
        
        .input-box { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 12px; }
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #999; display: flex; justify-content: space-between; margin-bottom: 8px; }
        label span { color: var(--dark); font-size: 0.85rem; }
        
        .slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 5px; background: #ddd; outline: none; margin: 10px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--strava); border: 3px solid white; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; font-weight: bold; background: white; outline: none; }
        
        .result-container { display: flex; gap: 12px; margin-top: 20px; }
        .result-box { flex: 1; background: #fdf2ee; padding: 15px; border-radius: 18px; text-align: center; border: 1px solid #feece6; }
        .result-val { font-size: 2rem; font-weight: 900; color: var(--strava); display: block; line-height: 1; }
        .result-unit { font-size: 0.7rem; font-weight: 800; color: #888; text-transform: uppercase; margin-top: 5px; display: block; }
        .result-label { font-size: 0.75rem; font-weight: bold; color: var(--dark); margin-bottom: 10px; display: block; }

        .warning { font-size: 0.7rem; color: #666; font-style: italic; margin-top: 15px; text-align: center; line-height: 1.4; border-top: 1px solid #eee; padding-top: 10px; }
        .warning b { color: #d00; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚲 TirePressure Pro</h1>

    <div class="input-box">
        <label>Systeemgewicht <span><span id="valWeight">85</span> kg</span></label>
        <input type="range" id="weight" min="50" max="130" value="85" class="slider" oninput="update()">
    </div>

    <div class="input-box">
        <label>Bandbreedte <span><span id="valWidth">28</span> mm</span></label>
        <input type="range" id="width" min="25" max="50" value="28" class="slider" oninput="update()">
    </div>

    <div class="input-box">
        <label>Ondergrond</label>
        <select id="surface" onchange="update()">
            <option value="1.0">Glad asfalt</option>
            <option value="0.95">Slecht asfalt / Kasseien</option>
            <option value="0.88">Hardpack gravel</option>
            <option value="0.80">Groffe gravel / Los zand</option>
        </select>
    </div>

    <div class="input-box">
        <label>Bandsysteem</label>
        <select id="setup" onchange="update()">
            <option value="1.0">Binnenband (Clincher)</option>
            <option value="0.9">Tubeless (Zonder binnenband)</option>
        </select>
    </div>

    <div class="result-container">
        <div class="result-box">
            <span class="result-label">VOOR</span>
            <span class="result-val" id="resFront">--</span>
            <span class="result-unit">Bar</span>
        </div>
        <div class="result-box">
            <span class="result-label">ACHTER</span>
            <span class="result-val" id="resRear">--</span>
            <span class="result-unit">Bar</span>
        </div>
    </div>

    <p class="warning" id="warningText">Pomp gravelbanden nooit harder dan de aangegeven druk op de wang van de band.</p>
</div>

<script>
    function update() {
        const weight = parseInt(document.getElementById('weight').value);
        const width = parseInt(document.getElementById('width').value);
        const surfaceMult = parseFloat(document.getElementById('surface').value);
        const setupMult = parseFloat(document.getElementById('setup').value);

        document.getElementById('valWeight').innerText = weight;
        document.getElementById('valWidth').innerText = width;

        // Basisformule: Druk is evenredig met gewicht en omgekeerd evenredig met breedte^1.5 (benadering van volume)
        // Constante is getuned voor bar waarden
        let basePressure = (weight / 15) * Math.pow(28 / width, 1.3);
        
        // Correcties toepassen
        let rear = basePressure * surfaceMult * setupMult;
        
        // Voorband ca. 6% zachter voor balans/comfort
        let front = rear * 0.94;

        // Limieten instellen (bijv. nooit onder 1.5 bar voor velgbescherming)
        rear = Math.max(rear, 1.5).toFixed(1);
        front = Math.max(front, 1.4).toFixed(1);

        document.getElementById('resFront').innerText = front;
        document.getElementById('resRear').innerText = rear;

        // Hookless waarschuwing (relevant bij moderne gravelwielen)
        const warn = document.getElementById('warningText');
        if (setupMult < 1.0 && (rear > 5.0 || front > 5.0)) {
            warn.innerHTML = "⚠️ <b>Let op:</b> Bij tubeless/hookless velgen is de limiet vaak 5.0 bar. Verlaag je druk!";
        } else if (width > 40 && rear > 3.5) {
            warn.innerHTML = "💡 <b>Tip:</b> Bij brede banden (>40mm) is 3.5+ bar vaak oncomfortabel. Probeer lager!";
        } else {
            warn.innerHTML = "Pomp banden nooit harder dan de aangegeven druk op de wang van de band.";
        }
    }

    // Init
    update();
</script>

</body>
</html>
